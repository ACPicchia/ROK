<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KvK C13212</title>
    <style>
        body { 
            background-color: #111; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .content-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90%;
        }

        img { 
            max-width: 100%; 
            max-height: 75vh; 
            height: auto; 
            display: block; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px; 
            cursor: pointer; /* Zeigt dem Nutzer, dass er hier klicken kann */
        }

        audio {
            width: 300px;
            outline: none;
            opacity: 0.6; /* Macht den Player dezent im Hintergrund sichtbar */
            transition: opacity 0.3s;
        }

        audio:hover {
            opacity: 1; /* Wird voll sichtbar, wenn man mit der Maus drüberfährt */
        }
    </style>
</head>
<body>

    <div class="content-box">
        <!-- Ihr zentriertes Bild -->
        <img src="2629.jpeg" alt="KvK Übersicht" onclick="startAudio()">

        <!-- Der Musik-Player mit Autoplay, Muted und Loop -->
        <audio id="kvkHymne" controls autoplay muted loop>
            <source src="hymne.mp3" type="audio/mpeg">
            Ihr Browser unterstützt das Audio-Element nicht.
        </audio>
    </div>

    <script>
        // Kleines Skript: Sobald der Nutzer auf das Bild klickt, 
        // wird die Stummschaltung aufgehoben, falls der Browser Autoplay blockiert hat.
        function startAudio() {
            var audio = document.getElementById("kvkHymne");
            audio.muted = false;
            audio.play();
        }
    </script>

</body>
</html>
