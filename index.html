<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I 5 INUTILI DEL 2629 ;-)</title>
    <style>
        body { 
            background-color: #111; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: sans-serif;
            position: relative;
        }

        .content-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90%;
        }

        img { 
            max-width: 100%; 
            max-height: 75vh; 
            height: auto; 
            display: block; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px; 
        }

        audio {
            width: 300px;
            outline: none;
            opacity: 0.6; 
            transition: opacity 0.3s;
        }

        audio:hover {
            opacity: 1; 
        }

        /* Das Start-Overlay für den ersten Klick */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .start-btn {
            background: linear-gradient(135deg, #ffaa00 0%, #e68a00 100%);
            color: #000;
            border: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 153, 0, 0.4);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Dieses Overlay blockiert die Seite, bis der Nutzer klickt -->
    <div id="overlay">
        <button class="start-btn" onclick="soundAktivieren()">Avvia l'inno & Entra</button>
    </div>

    <div class="content-box">
        <!-- Ihr zentriertes Bild -->
        <img src="2629.jpeg" alt="KvK Übersicht">

        <!-- Musik-Player ohne "muted" -->
        <audio id="kvkHymne" controls loop>
            <source src="hymne.mp3" type="audio/mpeg">
            Ihr Browser unterstützt das Audio-Element nicht.
        </audio>
    </div>

    <script>
        function soundAktivieren() {
            var audio = document.getElementById("kvkHymne");
            var overlay = document.getElementById("overlay");
            
            // Musik abspielen
            audio.play().catch(function(error) {
                console.log("Autoplay wurde vom Browser blockiert:", error);
            });
            
            // Overlay ausblenden
            overlay.style.opacity = "0";
            setTimeout(function() {
                overlay.style.display = "none";
            }, 400);
        }
    </script>

</body>
</html>
