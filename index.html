<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KvK C13212</title>
    <style>
        /* Der Hintergrund wird dunkel gehalten, damit das Bild gut wirkt */
        body { 
            background-color: #111; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .content-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90%;
        }

        /* Das Bild wird zentriert und passt sich der Bildschirmgröße an */
        img { 
            max-width: 100%; 
            max-height: 75vh; 
            height: auto; 
            display: block; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px; /* Abstand zum Musik-Player */
        }

        /* Styling für den Musik-Player */
        audio {
            width: 300px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="content-box">
        <!-- Ihr zentriertes Bild -->
        <img src="2629.jpeg" alt="KvK Übersicht">

        <!-- Der Musik-Player -->
        <!-- Ersetzen Sie 'hymne.mp3' durch den exakten Namen Ihrer Musikdatei -->
        <audio controls>
            <source src="hymne.mp3" type="audio/mpeg">
            Ihr Browser unterstützt das Audio-Element nicht.
        </audio>
    </div>

</body>
</html>
