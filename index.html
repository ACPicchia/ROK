<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KvK C13212</title>
    <style>
        body { 
            background-color: #111; 
            margin: 0; 
            padding: 40px 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            font-family: sans-serif;
            position: relative;
        }

        .content-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90%;
            margin-bottom: 60px; /* Abstand zwischen den beiden Sektionen */
        }

        /* Goldene, epische Titelüberschriften */
        h2 {
            color: #ff9900;
            font-size: 2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            text-align: center;
        }

        img { 
            max-width: 100%; 
            max-height: 75vh; 
            height: auto; 
            display: block; 
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            margin-bottom: 20px; 
        }

        audio {
            width: 300px;
            outline: none;
            opacity: 0.7; 
            transition: opacity 0.3s;
        }

        audio:hover {
            opacity: 1; 
        }

        /* Das Start-Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .start-btn {
            background: linear-gradient(135deg, #ffaa00 0%, #e68a00 100%);
            color: #000;
            border: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 153, 0, 0.4);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Start-Overlay für den ersten Klick (aktiviert den Sound) -->
    <div id="overlay">
        <button class="start-btn" onclick="soundAktivieren()">Avvia l'inno & Entra</button>
    </div>

    <!-- SEKTION 1 -->
    <div class="content-box">
        <h2>I 5 INUTILI</h2>
        <img src="2629.jpeg" alt="I 5 INUTILI">
        <audio id="kvkHymne1" controls loop>
            <source src="hymne.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- SEKTION 2 -->
    <div class="content-box">
        <h2>HOMER IL FABBRO PIZZAIOLO</h2>
        <!-- Vergessen Sie nicht, den Namen durch Ihre zweite Bilddatei zu ersetzen -->
        <img src="bild2.jpeg" alt="HOMER IL FABBRO PIZZAIOLO">
        <!-- Vergessen Sie nicht, den Namen durch Ihre zweite Musikdatei zu ersetzen -->
        <audio id="kvkHymne2" controls loop>
            <source src="hymne2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function soundAktivieren() {
            var audio1 = document.getElementById("kvkHymne1");
            var overlay = document.getElementById("overlay");
            
            // Startet das erste Lied automatisch nach dem Eintrittsklick
            audio1.play().catch(function(error) {
                console.log("Autoplay blockiert:", error);
            });
            
            overlay.style.opacity = "0";
            setTimeout(function() {
                overlay.style.display = "none";
            }, 400);
        }
    </script>

</body>
</html>
