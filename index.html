<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.P. 2629</title>
    <style>
        body { 
            background-color: #111; 
            margin: 0; 
            padding: 20px 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            font-family: sans-serif;
        }

        /* Das Navigationsmenü oben */
        .tab-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            max-width: 90%;
        }

        /* Styling für die Menü-Knöpfe */
        .tab-btn {
            background-color: #222;
            color: #aaa;
            border: 1px solid #444;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: #fff;
            background-color: #333;
        }

        /* Aktiv-Zustand für den ausgewählten Tab */
        .tab-btn.active {
            background: linear-gradient(135deg, #ffaa00 0%, #e68a00 100%);
            color: #000;
            border-color: #ffaa00;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
        }

        /* Die Inhalts-Boxen (Standardmäßig unsichtbar) */
        .content-box {
            display: none;
            flex-direction: column;
            align-items: center;
            max-width: 90%;
            animation: fadeIn 0.4s ease forwards;
        }

        /* Macht den aktiven Inhalt sichtbar */
        .content-box.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #ff9900;
            font-size: 2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            text-align: center;
        }

        img { 
            max-width: 100%; 
            max-height: 65vh; 
            height: auto; 
            display: block; 
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            margin-bottom: 25px; 
        }

        audio {
            width: 300px;
            outline: none;
            opacity: 0.9; 
        }

        .video-btn {
            background: linear-gradient(135deg, #ffaa00 0%, #e68a00 100%);
            color: #000;
            border: none;
            padding: 16px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
            text-align: center;
        }

        .video-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 153, 0, 0.5);
        }

        /* Start-Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .start-btn {
            background: linear-gradient(135deg, #ffaa00 0%, #e68a00 100%);
            color: #000;
            border: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 153, 0, 0.4);
        }
    </style>
</head>
<body>

    <!-- Start-Overlay -->
    <div id="overlay">
        <button class="start-btn" onclick="soundAktivieren()">Avvia l'inno & Entra</button>
    </div>

    <!-- DAS NAVIGATIONS-MENÜ -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('tab1')">I 5 INUTILI</button>
        <button class="tab-btn" onclick="switchTab('tab2')">Homer Pizzaiolo</button>
        <button class="tab-btn" onclick="switchTab('tab3')">Non Calpestarmi</button>
        <button class="tab-btn" onclick="switchTab('tab4')">Nuova Strada</button>
    </div>

    <!-- SEKTION 1: I 5 INUTILI -->
    <div id="tab1" class="content-box active">
        <h2>I 5 INUTILI</h2>
        <img src="2629.jpeg" alt="I 5 INUTILI">
        <audio id="kvkHymne1" controls>
            <source src="Inutili.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- SEKTION 2: HOMER PIZZAIOLO -->
    <div id="tab2" class="content-box">
        <h2>HOMER - IL FABBRO PIZZAIOLO 2629</h2>
        <img src="bild2.jpeg" alt="HOMER IL FABBRO PIZZAIOLO">
        <audio id="kvkHymne2" controls>
            <!-- Nutzt Homer.mp3 laut Ihrer Dateiliste -->
            <source src="Homer.mp3" type="audio/mpeg">
        </audio>
        <br><br>
        <h2>LA NUOVA CUCINA DI HOMER NEL 1452</h2>
        <img src="bild3.jpeg" alt="HOMER IL FABBRO PIZZAIOLO">
        <audio id="kvkHymne2" controls>
            <source src="Homer2.mp3" type="audio/mpeg">
        </audio>
        <br><br>

    </div>

    <!-- SEKTION 3: NON CALPESTARMI -->
    <div id="tab3" class="content-box">
        <h2>2629 NON CALPESTARMI</h2>
        <!-- KORRIGIERT: Verweist exakt auf CALPESTARMI1.jpeg -->
        <img src="CALPESTARMI1.jpeg" alt="CALPESTARMI">
        <a href="https://youtu.be" target="_blank" class="video-btn">Guarda il Video su YouTube</a>
    </div>

    <!-- SEKTION 4: NUOVA STRADA -->
    <div id="tab4" class="content-box">
        <h2>NUOVA STRADA VERSO IL 1452</h2>
        <!-- KORRIGIERT: Verweist exakt auf STRADA1.jpeg -->
        <img src="STRADA1.jpeg" alt="NUOVA STRADA">
        <a href="https://youtu.be" target="_blank" class="video-btn">Guarda il Video su YouTube</a>
    </div>

    <script>
        function soundAktivieren() {
            var audio1 = document.getElementById("kvkHymne1");
            var overlay = document.getElementById("overlay");
            
            if (audio1) {
                audio1.play().catch(function(error) {
                    console.log("Audio 1 blockiert:", error);
                });
            }
            
            if (overlay) {
                overlay.style.opacity = "0";
                setTimeout(function() {
                    overlay.style.display = "none";
                }, 400);
            }
        }

        function switchTab(tabId) {
            var boxes = document.querySelectorAll('.content-box');
            boxes.forEach(function(box) {
                box.classList.remove('active');
            });

            var buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(function(btn) {
                btn.classList.remove('active');
            });

            var audios = document.querySelectorAll('audio');
            audios.forEach(function(audio) {
                audio.pause();
            });

            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>

</body>
</html>
