<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.P. 2629</title>
    <style>
        body { 
            background-color: #111; 
            margin: 0; 
            padding: 40px 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            font-family: sans-serif;
            position: relative;
        }

        .content-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90%;
            margin-bottom: 60px;
        }

        h2 {
            color: #ff9900;
            font-size: 2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            text-align: center;
        }

        img { 
            max-width: 100%; 
            max-height: 75vh; 
            height: auto; 
            display: block; 
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            margin-bottom: 20px; 
        }

        /* Responsive Container für die YouTube Videos */
        .video-container {
            position: relative;
            width: 600px;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        audio {
            width: 300px;
            outline: none;
            opacity: 0.8; 
            transition: opacity 0.3s;
        }

        audio:hover {
            opacity: 1; 
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .start-btn {
            background: linear-gradient(135deg, #ffaa00 0%, #e68a00 100%);
            color: #000;
            border: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 153, 0, 0.4);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Start-Overlay für den ersten Klick -->
    <div id="overlay">
        <button class="start-btn" onclick="soundAktivieren()">Avvia l'inno & Entra</button>
    </div>

    <!-- SEKTION 1: Bild & Audio 1 -->
    <div class="content-box">
        <h2>I 5 INUTILI</h2>
        <img src="2629.jpeg" alt="I 5 INUTILI">
        <audio id="kvkHymne1" controls>
            <source src="Inutili.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- SEKTION 2: Bild & Audio 2 -->
    <div class="content-box">
        <h2>HOMER - IL FABBRO PIZZAIOLO</h2>
        <img src="bild2.jpeg" alt="HOMER IL FABBRO PIZZAIOLO">
        <audio id="kvkHymne2" controls>
            <source src="Homer.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- SEKTION 3: Video 1 (YouTube - NON CALPESTARMI) -->
    <div class="content-box">
        <h2>NON CALPESTARMI</h2>
        <div class="video-container">
            <!-- Korrigiert mit Sicherheits-Attributen für externe Domains -->
            <iframe src="https://youtube.com" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe>
        </div>
    </div>

    <!-- SEKTION 4: Video 2 (YouTube - NUOVA STRADA) -->
    <div class="content-box">
        <h2>NUOVA STRADA</h2>
        <div class="video-container">
            <!-- Korrigiert mit Sicherheits-Attributen für externe Domains -->
            <iframe src="https://youtube.com" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function soundAktivieren() {
            var audio1 = document.getElementById("kvkHymne1");
            var overlay = document.getElementById("overlay");
            
            if (audio1) {
                audio1.play().catch(function(error) {
                    console.log("Audio 1 wurde blockiert:", error);
                });
            }
            
            if (overlay) {
                overlay.style.opacity = "0";
                setTimeout(function() {
                    overlay.style.display = "none";
                }, 400);
            }
        }
    </script>

</body>
</html>
